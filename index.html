<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kranti - E-Book Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOP NAVIGATION BAR -->
    <nav class="navbar">
        <div class="nav-left">
            <button class="side-btn" onclick="location.href='index.html'">Home</button>
            <button class="side-btn" onclick="location.href='about.html'">About Author</button>
        </div>

        <div class="nav-right">
            <button class="auth-btn" onclick="openModal('signinModal')">Sign In</button>
            <button class="auth-btn" onclick="openModal('signupModal')">Sign Up</button>
        </div>
    </nav>

    <!-- SIGN IN MODAL -->
    <div id="signinModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('signinModal')">&times;</span>
            <h2>Sign In</h2>
            <form>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- SIGN UP MODAL -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('signupModal')">&times;</span>
            <h2>Sign Up</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero-section">
        <h1 class="hero-title">Happy Reading</h1>
        <p class="hero-subtitle">Discover your next favorite story</p>
    </div>

    <!-- MAIN CONTENT -->
    <div class="book-section">
        <h2>Dashanan: Adi</h2>
        <img src="book.jpg" id="bookImage" width="200">
        <br><br>
        <button class="read-btn" onclick="location.href='read.html'">Read Book</button>
    </div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>
</html>
